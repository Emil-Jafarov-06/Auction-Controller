spring:
  application:
    name: AuctionController

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auction_db}
    username: ${DB_USERNAME:auction_user}
    password: ${DB_PASSWORD:auction_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

mybatis:
    mapper-locations: classpath:mappers/*.xml
    type-aliases-package: com.team4.auctioncontroller.auction.model