server:
  port: 8083

spring:
  application:
    name: auth-service

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auction_db}
    username: ${DB_USERNAME:auction_user}
    password: ${DB_PASSWORD:auction_pass}
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: user_schema
    show-sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET_KEY}
  access-token:
    expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:300000}
  refresh-token:
    expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:3600000}


app:
  admin:
    bootstrap:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
      fullname: ${BOOTSTRAP_ADMIN_FULLNAME:System_Admin}
      email: ${BOOTSTRAP_ADMIN_EMAIL}
      password: ${BOOTSTRAP_ADMIN_PASSWORD}
      pin: ${BOOTSTRAP_ADMIN_PIN}
  mail:
    verification-end-point: ${EMAIL_VERIFICATION_URL:http://localhost:8083/api/auth/verify-email}