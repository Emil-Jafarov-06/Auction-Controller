databaseChangeLog:
  - changeSet:
      id: 003-create-email-verification-table
      author: emil
      changes:
        - createTable:
            tableName: email_verification_token
            schemaName: user_schema
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_verification_token

              - column:
                  name: token
                  type: VARCHAR(36)
                  constraints:
                    unique: true
                    uniqueConstraintName: uk_token
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: is_used
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: create_date
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: expiry_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false