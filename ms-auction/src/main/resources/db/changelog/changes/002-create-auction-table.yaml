databaseChangeLog:
  - changeSet:
      author: emil
      id: 002-create-auction-table
      changes:
        - createTable:
            tableName: auction
            schemaName: auction_schema
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_auction

              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: start_price
                  type: NUMERIC(15,2)
                  constraints:
                    nullable: false

              - column:
                  name: start_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: end_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: winner_id
                  type: BIGINT
                  constraints:
                    nullable: true

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: modified_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false