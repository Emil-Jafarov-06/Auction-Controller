server:
  port: 8081

spring:
  application:
    name: ms-auction

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auction_db?currentSchema=auction_schema}
    username: ${DB_USERNAME:auction_user}
    password: ${DB_PASSWORD:auction_pass}
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.project.msauction.auction.model

services:
  bidding:
    base-url: http://localhost:8082