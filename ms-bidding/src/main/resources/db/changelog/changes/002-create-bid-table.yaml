databaseChangeLog:
  - changeSet:
      id: 002-create-bid-table
      author: emil
      changes:
        - createTable:
            tableName: bid
            schemaName: bidding_schema
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_bid

              - column:
                  name: auction_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: amount
                  type: NUMERIC(15, 2)
                  constraints:
                    nullable: false

              - column:
                  name: placed_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false